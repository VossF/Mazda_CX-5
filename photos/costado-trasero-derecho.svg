<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Pendiente: costado trasero derecho</title>
  <desc id="desc">Espacio reservado para la foto de puerta trasera, salpicadera, tapa de gasolina, calavera y llanta trasera derecha.</desc>
  <rect width="1200" height="1600" fill="#eee9e1"/>
  <rect x="40" y="40" width="1120" height="1520" rx="36" fill="none" stroke="#8f1d2c" stroke-width="8" stroke-dasharray="28 22"/>
  <text x="600" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#681421">Costado trasero derecho</text>
  <text x="600" y="815" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#656565">Archivo pendiente de reemplazar con la foto real</text>
</svg>
